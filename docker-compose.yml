version: "3.8"

services:
  app:
    build: .
    container_name: ai-live-commerce
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./.env:/app/.env
    environment:
      - MOCK_MODE=false
      - DASHBOARD_PORT=8001
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/diagnostic/health"]
      interval: 30s
      timeout: 5s
      retries: 3
